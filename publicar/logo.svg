<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://w3.org">
  <!-- Cercle d'eau (fond) -->
  <circle cx="100" cy="100" r="80" fill="#0077be" />
  
  <!-- Corps du requin (forme simplifiée) -->
  <path d="M40,120 Q100,20 160,120 T100,160 Q60,160 40,120" fill="#7d8ea3" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Ventre blanc -->
  <path d="M60,125 Q100,60 140,125 Q100,145 60,125" fill="#f0f3f4" />
  
  <!-- Bouche ouverte -->
  <path d="M80,110 Q100,150 120,110 Z" fill="#c0392b" />
  
  <!-- Dents -->
  <polyline points="85,110 90,120 95,110 100,120 105,110 110,120 115,110" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Œil -->
  <circle cx="115" cy="85" r="3" fill="black" />
  
  <!-- Éclaboussures simples -->
  <path d="M30,130 Q10,110 30,90" fill="none" stroke="#85c1e9" stroke-width="3" stroke-linecap="round"/>
  <path d="M170,130 Q190,110 170,90" fill="none" stroke="#85c1e9" stroke-width="3" stroke-linecap="round"/>
</svg>
